name: TurboRVB (Intel classic icc/ifort + MKL + IntelMPI)

on:
  push:
    branches: [ "main", "devel" ]
  pull_request:
    branches: [ "main", "devel" ]

jobs:
  intelclassic-mkl-intelmpi:
    runs-on: ubuntu-22.04

    # Run inside the oneAPI HPC 2023.2 container that includes icc/ifort
    container:
      image: intel/oneapi-hpckit:2023.2-devel-ubuntu22.04

    env:
      # Keep threads low for CI VMs
      OMP_NUM_THREADS: 2
      I_MPI_FABRICS: "shm"
      I_MPI_SHM_HEAP_VSIZE: "64M"
      # Force Intel MPI wrappers to use classic compilers
      I_MPI_CC: icc
      I_MPI_CXX: icpc
      I_MPI_FC: ifort

    steps:
      - name: Source oneAPI environment
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh
          printenv | tee -a $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pandas

      - name: Sanity check compilers
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh
          icc -v
          ifort -V
          mpiicc -show
          mpiifort -show

      - name: Lint
        run: python ./devel_tools/run_linter.py .

      - name: Configure (CMake with Unix Makefiles)
        env:
          CC: mpiicc
          CXX: mpiicpc
          FC: mpiifort
        run: |
          cmake -S . -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DEXT_PARALLEL=ON \
            -DBLA_VENDOR=Intel10_64lp \
            -DCMAKE_Fortran_COMPILER=mpiifort

      - name: Build
        run: cmake --build build -j 2

      - name: Test
        run: ctest --test-dir build --output-on-failure
