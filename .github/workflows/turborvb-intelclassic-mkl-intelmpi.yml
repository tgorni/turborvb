name: TurboRVB (Intel classic icc/ifort + MKL + IntelMPI)

on:
  push:
    branches: [ "main", "devel" ]
  pull_request:
    branches: [ "main", "devel" ]

jobs:
  intelclassic-mkl-intelmpi:
    runs-on: ubuntu-22.04
    env:
      # Keep thread count low for CI VMs
      OMP_NUM_THREADS: 2
      I_MPI_FABRICS: "shm"
      I_MPI_SHM_HEAP_VSIZE: "64M"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Add Intel oneAPI APT repository
        run: |
          wget https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          rm GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          echo "deb https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update

      - name: Install Intel classic compilers, IntelMPI, MKL
        run: |
          sudo apt-get install -y --no-install-recommends \
            cmake pkg-config python3-pip \
            intel-oneapi-compiler-fortran \
            intel-oneapi-compiler-dpcpp-cpp-and-cpp-classic \
            intel-oneapi-mpi intel-oneapi-mpi-devel \
            intel-oneapi-mkl
          python -m pip install --upgrade pip
          pip install numpy scipy pandas
          # Export oneAPI env (icc/ifort, MPI, MKL)
          bash -lc 'source /opt/intel/oneapi/setvars.sh && printenv >> $GITHUB_ENV'

      - name: Lint
        run: python ./devel_tools/run_linter.py .

      - name: Configure (CMake)
        # Use Intel MPI wrappers that invoke icc/icpc/ifort
        env:
          CC: mpiicc
          CXX: mpiicpc
          FC: mpiifort
        run: |
          cmake -S . -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DEXT_PARALLEL=ON \
            -DBLA_VENDOR=Intel10_64lp

      - name: Build
        run: cmake --build build -j 2

      - name: Test
        run: ctest --test-dir build --output-on-failure
