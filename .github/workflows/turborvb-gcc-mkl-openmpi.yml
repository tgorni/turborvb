name: TurboRVB (GCC + MKL + OpenMPI)

on:
  push:
    branches: [ "main", "devel" ]
  pull_request:
    branches: [ "main", "devel" ]

jobs:
  gcc-mkl-openmpi:
    runs-on: ubuntu-22.04
    env:
      OMP_NUM_THREADS: 2
      OMPI_MCA_rmaps_base_oversubscribe: "1"
      OMPI_MCA_btl_vader_single_copy_mechanism: "none"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Add Intel oneAPI APT repository
        run: |
          wget https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          rm GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          echo "deb https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update

      - name: Install GCC, OpenMPI, MKL
        run: |
          sudo apt-get install -y --no-install-recommends \
            gcc g++ gfortran cmake pkg-config \
            openmpi-bin libopenmpi-dev \
            intel-oneapi-mkl python3-pip
          python -m pip install --upgrade pip
          pip install numpy scipy pandas
          # Export MKLROOT and other env vars
          bash -lc 'source /opt/intel/oneapi/setvars.sh && printenv >> $GITHUB_ENV'

      - name: Lint
        run: python ./devel_tools/run_linter.py .

      - name: Configure (CMake, force MKL gf + sequential)
        env:
          CC: mpicc
          CXX: mpicxx
          FC: mpifort
          # Keep MKL single-threaded for stability
          MKL_THREADING_LAYER: SEQUENTIAL
          MKL_NUM_THREADS: 1
          OMPI_MCA_rmaps_base_oversubscribe: "1"
          OMPI_MCA_btl_vader_single_copy_mechanism: "none"
        run: |
          # Sanity: make sure MKL gf libs exist
          ls -l $MKLROOT/lib/intel64/libmkl_gf_lp64.so
          ls -l $MKLROOT/lib/intel64/libmkl_core.so
          ls -l $MKLROOT/lib/intel64/libmkl_sequential.so

          cmake -S . -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DEXT_PARALLEL=ON \
            -DBLA_VENDOR=Generic \
            -DBLAS_LIBRARIES="$MKLROOT/lib/intel64/libmkl_gf_lp64.so;$MKLROOT/lib/intel64/libmkl_core.so;$MKLROOT/lib/intel64/libmkl_sequential.so" \
            -DLAPACK_LIBRARIES="$MKLROOT/lib/intel64/libmkl_gf_lp64.so;$MKLROOT/lib/intel64/libmkl_core.so;$MKLROOT/lib/intel64/libmkl_sequential.so" \
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,--no-as-needed"

      - name: Build
        run: cmake --build build -j 2

      - name: Test
        run: ctest --test-dir build --output-on-failure
